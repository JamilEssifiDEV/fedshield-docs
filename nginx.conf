server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Astro Starlight emits clean URLs (/quickstart/, /concepts/peers/) with
    # directory-style index.html files. try_files handles them cleanly.
    location / {
        try_files $uri $uri/index.html $uri.html =404;
    }

    # Cache hashed assets aggressively, immutable.
    location ~* \.(css|js|woff2?|svg|png|jpg|webp|avif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Don't cache HTML — content updates need to surface immediately.
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }

    # The OpenAPI spec is served from /openapi.yaml; allow CORS so Scalar can
    # fetch it from anywhere if we ever embed the reference elsewhere.
    location = /openapi.yaml {
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "no-cache";
        types { } default_type application/yaml;
    }

    # Small custom error page for 404s. Starlight emits a 404.html.
    error_page 404 /404.html;
}
