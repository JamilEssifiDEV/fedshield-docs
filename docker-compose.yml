services:
  docs:
    build:
      context: .
      dockerfile: Dockerfile
    image: fedshield-docs:local
    container_name: fedshield-docs
    ports:
      # Host port 4321 (matches Astro's dev-server convention) -> container 80.
      # Federation-core uses 8080, so this stays out of its way.
      - "4321:80"
    restart: unless-stopped
    healthcheck:
      # nginx:alpine has no wget/curl; use /dev/tcp via the shell to probe the
      # listening socket. Works as long as the entrypoint is busybox sh.
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/80 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
